name: Security Audit

on:
  schedule:
    # Ajuste: horário/frequência da auditoria automática.
    # Exemplo atual: toda segunda às 09:00 (Brasília, UTC-3 -> 12:00 UTC)
    - cron: '0 12 * * 1'
  workflow_dispatch: {}
  pull_request:
    # Ajuste: nome da branch principal do projeto (main / master / develop)
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          # Ajuste: versão do Node usada no projeto
          node-version: '20'
          cache: 'npm'

      # Ajuste (monorepo): se o package.json não estiver na raiz (ex: Jome
      # Cargus), adicione em cada step abaixo:
      #   working-directory: ./apps/nome-do-pacote
      - name: Instalar dependências
        run: npm ci

      # Ajuste: "high" é o nível mínimo de severidade reportado.
      # Use "critical" para ser menos rígido, ou "moderate" para ser mais.
      - name: Auditoria de dependências (nível high)
        run: npm audit --audit-level=high

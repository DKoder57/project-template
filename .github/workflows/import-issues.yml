name: Importador Automático de Issues

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  import-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Importar Issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'EOF'
          import csv
          import subprocess
          import json
          import sys

          # Arquivo esperado:
          # issues.csv
          #
          # Exemplo:
          # Title,Description
          # "[F1][Core] Implementar GridPosition","Criar sistema de coordenadas."
          # "[F1][Core] Implementar SnakeState","Representar estado da cobra."
          #
          # Colunas obrigatórias:
          # - Title
          # - Description
          CSV_FILE = "issues.csv"

          # --- Modelo otimizado ---
          # Antes: 1 chamada `gh issue list --search` por linha do CSV (lento e
          # sujeito a atraso de indexação da busca do GitHub).
          # Agora: busca TODAS as issues existentes uma única vez, antes do
          # loop, e compara em memória. Também usa check=True aqui: se essa
          # chamada falhar, o script para em vez de seguir achando que não
          # existe nenhuma issue (o que criaria duplicatas em silêncio).
          list_result = subprocess.run(
              [
                  'gh', 'issue', 'list',
                  '--state', 'all',
                  '--json', 'title',
                  '--limit', '1000'
              ],
              capture_output=True,
              text=True
          )
          if list_result.returncode != 0:
              print('Falha ao listar issues existentes:', list_result.stderr, file=sys.stderr)
              sys.exit(1)

          existing_titles = {issue['title'] for issue in json.loads(list_result.stdout)}
          # --- Fim do modelo otimizado ---

          with open(CSV_FILE, newline='', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  title = row['Title'].strip()
                  body = row['Description'].strip()

                  if title in existing_titles:
                      print(f'Issue já existe: {title}')
                      continue

                  print(f'Criando issue: {title}')
                  subprocess.run(
                      [
                          'gh',
                          'issue',
                          'create',
                          '--title', title,
                          '--body', body
                      ],
                      check=True
                  )
                  # Evita duplicata caso o mesmo título apareça mais de uma
                  # vez no próprio CSV.
                  existing_titles.add(title)
          EOF
